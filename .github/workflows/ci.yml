name: CI

on:
  push:
    branches: [main, sprint-*]
  pull_request:
    branches: [main]

jobs:
  core:
    name: Core Engine
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Lint (ruff)
        run: poetry run ruff check pyworldx/ tests/

      - name: Type check (mypy)
        run: poetry run mypy pyworldx/ --ignore-missing-imports

      - name: Run tests
        run: poetry run pytest tests/ -v --tb=short --ignore=tests/validation

  pipeline:
    name: Data Pipeline
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (with pipeline extras)
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --extras pipeline

      - name: Lint pipeline (ruff)
        run: poetry run ruff check data_pipeline/

      - name: Run pipeline tests (offline only)
        run: poetry run pytest data_pipeline/tests/ -v --tb=short -m "not network"
