name: CI

on:
  push:
    branches: [main, sprint-*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Lint (ruff)
        run: poetry run ruff check pyworldx/ tests/

      - name: Type check (mypy)
        run: poetry run mypy pyworldx/ --ignore-missing-imports

      - name: Run tests
        run: poetry run pytest tests/ -v --tb=short --ignore=tests/validation
